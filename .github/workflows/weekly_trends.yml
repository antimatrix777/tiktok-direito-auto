name: Pesquisa semanal de tendências

on:
  schedule:
    # Toda segunda-feira às 10h BRT (13:00 UTC)
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  pesquisar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install pytrends requests

      - name: Pesquisar tendências da semana
        run: python scripts/1_research.py

      - name: Salvar fila atualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/topics_queue.json
          git diff --staged --quiet || git commit -m "chore: tendências $(date +'%Y-W%V')"
          git push
